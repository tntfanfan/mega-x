# AWS Amplify Hosting build spec.
#
# Monorepo format with appRoot: . — required when the Amplify app is
# configured in monorepo mode in the console. Even though this repo is a
# single app, the spec uses the monorepo shape so Amplify validates it.
#
# v3 (2026-06-24): switched npm → pnpm via corepack. Reason: the project
# uses pnpm locally (one lockfile, no double-lockfile drift). Amplify's
# default `npm ci` strictly enforces package-lock.json which fell out of
# sync the moment any dep was added through `corepack pnpm add`.
#
# Vite build emits everything to dist/ — that's what Amplify uploads to its CDN.
# Mock mode is on in production via .env.production (VITE_USE_MOCK=true), so
# the deployed site runs without any backend.

version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - corepack enable
            - corepack prepare pnpm@9.0.0 --activate
            - pnpm --version
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ~/.local/share/pnpm/store/**/*
          - .vite/**/*
