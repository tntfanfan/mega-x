# AWS Amplify Hosting build spec.
#
# Monorepo format with appRoot: . — required when the Amplify app is
# configured in monorepo mode in the console. Even though this repo is a
# single app, the spec uses the monorepo shape so Amplify validates it.
#
# v4 (2026-06-24): switched corepack → `npm install -g pnpm` to install pnpm.
# Reason: Amplify's build environment with Node 22.18 + corepack 0.34 hangs
# at `corepack prepare pnpm@x.y.z --activate` because of strict signature
# verification timing out against the Vercel-hosted signature endpoint.
# `npm install -g pnpm@9.0.0` reaches the public npm registry directly and
# completes in ~5 seconds.
#
# Mock mode is on in production via .env.production (VITE_USE_MOCK=true), so
# the deployed site runs without any backend.

version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - node --version
            - npm --version
            - npm install -g pnpm@9.0.0
            - pnpm --version
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - ~/.local/share/pnpm/store/**/*
          - .vite/**/*
