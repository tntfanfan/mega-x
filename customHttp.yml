# AWS Amplify Hosting — custom HTTP headers.
#
# 仅管 HEADERS。Console 用 HashRouter，所以**不需要任何 SPA rewrite 规则**。

customHeaders:
  # console SPA 的 HTML shell 不缓存（每次访问拉最新版本）
  - pattern: '/console/**/*.html'
    headers:
      - key: Cache-Control
        value: 'no-cache, no-store, must-revalidate'

  # 带 hash 的 vite 资产 — 1 年长缓存
  - pattern: '/assets/**'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
